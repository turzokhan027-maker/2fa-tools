<script>
    // ==========================================
    // ১. TOTP ও CRYPTO কোর ইঞ্জিন লজিক (Sync)
    // ==========================================
    const BASE32_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';

    function base32Decode(base32) {
        base32 = base32.toUpperCase().replace(/=+$/, '');
        let bits = '';
        
        for (let i = 0; i < base32.length; i++) {
            const val = BASE32_CHARS.indexOf(base32[i]);
            if (val === -1) throw new Error('Invalid base32 character');
            bits += val.toString(2).padStart(5, '0');
        }
        
        const bytes = [];
        for (let i = 0; i + 8 <= bits.length; i += 8) {
            bytes.push(parseInt(bits.substr(i, 8), 2));
        }
        
        return new Uint8Array(bytes);
    }

    function hmacSha1Sync(key, message) {
        const blockSize = 64;
        
        if (key.length > blockSize) {
            key = sha1(key);
        }
        if (key.length < blockSize) {
            const padded = new Uint8Array(blockSize);
            padded.set(key);
            key = padded;
        }
        
        const innerKey = new Uint8Array(blockSize);
        const outerKey = new Uint8Array(blockSize);
        
        for (let i = 0; i < blockSize; i++) {
            innerKey[i] = key[i] ^ 0x36;
            outerKey[i] = key[i] ^ 0x5c;
        }
        
        const innerHash = sha1(concat(innerKey, message));
        return sha1(concat(outerKey, innerHash));
    }

    function sha1(data) {
        if (!(data instanceof Uint8Array)) {
            data = new Uint8Array(data);
        }
        
        let h0 = 0x67452301;
        let h1 = 0xEFCDAB89;
        let h2 = 0x98BADCFE;
        let h3 = 0x10325476;
        let h4 = 0xC3D2E1F0;
        
        const ml = data.length * 8;
        const paddedLength = Math.ceil((ml + 65) / 512) * 512 / 8;
        const padded = new Uint8Array(paddedLength);
        padded.set(data);
        padded[data.length] = 0x80;
        
        const view = new DataView(padded.buffer);
        view.setUint32(paddedLength - 4, ml & 0xffffffff, false);
        
        for (let i = 0; i < paddedLength; i += 64) {
            const w = new Uint32Array(80);
            
            for (let j = 0; j < 16; j++) {
                w[j] = view.getUint32(i + j * 4, false);
            }
            
            for (let j = 16; j < 80; j++) {
                w[j] = leftRotate(w[j-3] ^ w[j-8] ^ w[j-14] ^ w[j-16], 1);
            }
            
            let a = h0, b = h1, c = h2, d = h3, e = h4;
            
            for (let j = 0; j < 80; j++) {
                let f, k;
                if (j < 20) {
                    f = (b & c) | ((~b) & d);
                    k = 0x5A827999;
                } else if (j < 40) {
                    f = b ^ c ^ d;
                    k = 0x6ED9EBA1;
                } else if (j < 60) {
                    f = (b & c) | (b & d) | (c & d);
                    k = 0x8F1BBCDC;
                } else {
                    f = b ^ c ^ d;
                    k = 0xCA62C1D6;
                }
                
                const temp = (leftRotate(a, 5) + f + e + k + w[j]) & 0xffffffff;
                e = d;
                d = c;
                c = leftRotate(b, 30);
                b = a;
                a = temp;
            }
            
            h0 = (h0 + a) & 0xffffffff;
            h1 = (h1 + b) & 0xffffffff;
            h2 = (h2 + c) & 0xffffffff;
            h3 = (h3 + d) & 0xffffffff;
            h4 = (h4 + e) & 0xffffffff;
        }
        
        const result = new Uint8Array(20);
        const resultView = new DataView(result.buffer);
        resultView.setUint32(0, h0, false);
        resultView.setUint32(4, h1, false);
        resultView.setUint32(8, h2, false);
        resultView.setUint32(12, h3, false);
        resultView.setUint32(16, h4, false);
        
        return result;
    }

    function leftRotate(n, s) {
        return ((n << s) | (n >>> (32 - s))) & 0xffffffff;
    }

    function concat(a, b) {
        const result = new Uint8Array(a.length + b.length);
        result.set(a);
        result.set(b, a.length);
        return result;
    }

    function generateTOTP(secret) {
        try {
            secret = secret.replace(/\s/g, '').toUpperCase();
            const key = base32Decode(secret);
            const epoch = Math.floor(Date.now() / 1000);
            const timeStep = Math.floor(epoch / 30);
            
            const timeBytes = new Uint8Array(8);
            const timeView = new DataView(timeBytes.buffer);
            timeView.setUint32(4, timeStep, false);
            
            const hmac = hmacSha1Sync(key, timeBytes);
            const offset = hmac[19] & 0x0f;
            const truncated = (
                ((hmac[offset] & 0x7f) << 24) |
                ((hmac[offset + 1] & 0xff) << 16) |
                ((hmac[offset + 2] & 0xff) << 8) |
                (hmac[offset + 3] & 0xff)
            );
            
            return (truncated % 1000000).toString().padStart(6, '0');
        } catch (error) {
            console.error('TOTP generation error:', error);
            throw new Error('Invalid secret key');
        }
    }

    // ==========================================
    // ২. ইন্টারফেস কন্ট্রোল এবং তাৎক্ষণিক হিস্টোরি (Max 20)
    // ==========================================
    let history = [];
    let autoHideTimeout = null;

    function loadHistory() {
        const saved = localStorage.getItem('totpHistory');
        if (saved) {
            try {
                history = JSON.parse(saved);
                // যদি পুরোনো ব্যাকআপে ২০টির বেশি থাকে, তবে তা ফিল্টার করে ২০টি করে নেবে
                if (history.length > 20) {
                    history = history.slice(0, 20);
                }
                updateHistoryDisplay();
            } catch (e) {
                console.error('Failed to load history:', e);
                history = [];
            }
        }
    }

    function saveHistory() {
        try {
            localStorage.setItem('totpHistory', JSON.stringify(history));
        } catch (e) {
            console.error('Failed to save history:', e);
        }
    }

    function generateCode() {
        const secretInput = document.getElementById('secretKey');
        const secret = secretInput.value.trim().toUpperCase().replace(/\s/g, '');
        
        if (!secret) {
            alert('⚠️ Please enter a secret key!');
            return;
        }
        
        try {
            const code = generateTOTP(secret);
            
            // ১. তৎক্ষণাৎ মেইন ডিসপ্লে বক্সে কোড দেখাবে
            document.getElementById('totpCode').textContent = code;
            document.getElementById('codeDisplay').style.display = 'block';
            
            // ২. সাথে সাথেই ক্লিপবোর্ডে কপি হবে
            copyToClipboard(code);
            
            // ৩. ১ সেকেন্ডের মাথায় তৎক্ষণাৎ হিস্টোরিতে যোগ হবে (কোনো ৩০ সেকেন্ডের লেট নাই)
            addToHistory(secret, code);
            
            // ইনপুট বক্স ক্লিয়ার
            secretInput.value = '';
            
            // আগের যেকোনো হাইড টাইমার থাকলে রিসেট করবে
            if (autoHideTimeout) {
                clearTimeout(autoHideTimeout);
            }
            
            // মেইন ডিসপ্লে বক্সটি ৩০ সেকেন্ড পর হাইড হবে যেন সিকিউরিটি বজায় থাকে
            autoHideTimeout = setTimeout(() => {
                document.getElementById('codeDisplay').style.display = 'none';
                document.getElementById('totpCode').textContent = '------';
            }, 30000);
            
        } catch (error) {
            alert('❌ Invalid secret key! Please check and try again.');
            console.error('Generation error:', error);
        }
    }

    function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                showCopyHint();
            }).catch(err => {
                console.error('Failed to copy:', err);
                fallbackCopy(text);
            });
        } else {
            fallbackCopy(text);
        }
    }

    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            showCopyHint();
        } catch (err) {
            console.error('Fallback copy failed:', err);
        }
        document.body.removeChild(textarea);
    }

    function showCopyHint() {
        const hint = document.getElementById('copyHint');
        hint.classList.add('show');
        setTimeout(() => {
            hint.classList.remove('show');
        }, 2000);
    }

    function addToHistory(secret, code) {
        const now = new Date();
        const timestamp = now.toLocaleString('en-US', {
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            hour12: true
        });
        
        // একদম শুরুতে নতুন ডেটা পুশ করবে
        history.unshift({
            secret: secret,
            code: code,
            time: timestamp
        });
        
        // [শর্তানুযায়ী ফিক্স]: ২০টি হয়ে গেলে অটোমেটিক পুরোনো ১টি ডিলিট করে স্লট ফাঁকা করবে
        if (history.length > 20) {
            history = history.slice(0, 20);
        }
        
        saveHistory();
        updateHistoryDisplay();
    }

    function updateHistoryDisplay() {
        const historyList = document.getElementById('historyList');
        const historyCount = document.getElementById('historyCount');
        
        historyCount.textContent = `${history.length} saved`;
        
        if (history.length === 0) {
            historyList.innerHTML = '<p class="empty-state">No codes generated yet</p>';
            return;
        }
        
        historyList.innerHTML = history.map(item => `
            <div class="history-item">
                <div class="history-code">${item.code}</div>
                <div class="history-details">
                    <div class="history-key">Key: ${item.secret}</div>
                    <div class="history-time">${item.time}</div>
                </div>
            </div>
        `).join('');
    }

    document.getElementById('secretKey').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            generateCode();
        }
    });

    document.addEventListener('DOMContentLoaded', function() {
        loadHistory();
    });
</script>

    const MAX_HISTORY = 20;

    function generateAndSave() {
        const keyInput = document.getElementById('secret-key');

        // Code Generation
        const code = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('2fa-result').innerText = code;

    }

        item.className = 'history-item';

        const currentItems = container.getElementsByClassName('history-item');
        if (currentItems.length > MAX_HISTORY) {
            container.removeChild(container.lastChild);
        }
    }

        const code = document.getElementById('2fa-result').innerText;

            gap: 12px;
            margin-bottom: 18px;

        .btn-start {
            flex: 1;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: white;
            border: none;

            border-radius: 12px;

            font-weight: 700;
            letter-spacing: 0.5px;

        /* ব্ল্যাক কনসোল বক্স - স্ক্রল ফ্রেন্ডলি */

            width: 100%;
            height: 260px;
            background: #030712;

            font-family: 'Courier New', Courier, monospace;

            color: #34d399;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid #1f2937;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.6);
            line-height: 1.6;
            -webkit-overflow-scrolling: touch;
        }

        .console-log { margin-bottom: 4px; word-break: break-all; }
        .log-live { color: #34d399; font-weight: 600; }
        .log-die { color: #f87171; }

        /* ফুটারে থাকা কাউন্টার এবং ডাউনলোড বাটন */

            display: flex;
            flex-direction: column;

            align-items: center;
        }

        @media (min-width: 600px) {
            .footer-row {
                flex-direction: row;
                justify-content: space-between;
            }
        }

        .stats-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        @media (min-width: 600px) {
            .stats-group { width: auto; }

        .stat-card {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 10px;

            min-width: 85px;
        }

        .stat-num {
            font-size: 15px;
            font-weight: 700;
            display: block;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 10px;
            color: #9ca3af;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .total-color { color: #e5e7eb; }
        .live-color { color: #34d399; }
        .die-color { color: #f87171; }

        .btn-download {
            width: 100%;
            background: #059669;
            color: white;
            border: none;
            padding: 15px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(5, 150, 105, 0.4);
            transition: background 0.2s;
            text-align: center;
            text-transform: uppercase;
        }

        @media (min-width: 600px) {
            .btn-download { width: auto; }
        }

        .btn-download:hover { background: #047857; }
    </style>
</head>
<body>

    <div class="main-panel">
        <div class="panel-title">Bulk UID Checker Pro</div>
        
        <div class="input-area-wrapper">
            <textarea id="inputData" placeholder="Paste data here... (Supports UID|PASS|2FA or Space/Tab separated formats)"></textarea>
        </div>

        <div class="action-row">
            <button class="btn-start" id="startBtn" onclick="startScanner()">Start Scanner</button>
            <button class="btn-clear" onclick="clearTool()">Clear</button>
        </div>

        <div class="console-box" id="consoleScreen">Console ready...</div>

        <div class="footer-row">
            <div class="stats-group">
                <div class="stat-card">
                    <span class="stat-num total-color" id="totalCount">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num live-color" id="livePercent">0% LIVE</span>
                    <span class="stat-label">Live</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num die-color" id="diePercent">0% DIE</span>
                    <span class="stat-label">Die</span>
                </div>
            </div>
            
            <button class="btn-download" onclick="downloadLiveCSV()">Download Live Accounts</button>
        </div>
    </div>

<script>
    let liveAccounts = []; 
    const CONCURRENCY_LIMIT = 5; 

    async function checkFacebookUID(uid) {
        try {
            const cleanUID = uid.trim().replace(/[^a-zA-Z0-9.]/g, "");
            if(!cleanUID) return "DEAD ❌";
            
            const response = await fetch(`https://graph.facebook.com/${cleanUID}/picture?type=normal&_ts=${Date.now()}`);
            if (response.ok && response.url.includes('100x100')) {
                return "LIVE ✅";
            } else {
                return "DEAD ❌";
            }
        } catch (error) {
            return "ERROR ⚠️";
        }
    }

    async function startScanner() {
        const inputStr = document.getElementById('inputData').value.trim();
        const consoleScreen = document.getElementById('consoleScreen');
        const startBtn = document.getElementById('startBtn');
        
        if (!inputStr) {
            alert("Please paste your UID data first!");
            return;
        }

        const lines = inputStr.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        
        consoleScreen.innerHTML = "Initializing fast multi-threaded engine...<br>";
        liveAccounts = [];
        let total = lines.length;
        let live = 0;
        let die = 0;

        document.getElementById('totalCount').innerText = total;
        startBtn.disabled = true;
        startBtn.innerText = "Scanning Fast...";

        function updateStats() {
            const livePct = total > 0 ? Math.round((live / total) * 100) : 0;
            const diePct = total > 0 ? Math.round((die / total) * 100) : 0;
            document.getElementById('livePercent').innerText = `${livePct}% LIVE`;
            document.getElementById('diePercent').innerText = `${diePct}% DIE`;
        }

        const queue = [...lines];
        
        async function worker() {
            while (queue.length > 0) {
                const currentLine = queue.shift();
                if (!currentLine) continue;

                let uid = '';
                let pass = '';
                let twoFA = '';

                if (currentLine.includes('|')) {
                    const parts = currentLine.split('|');
                    uid = parts[0] ? parts[0].trim() : '';
                    pass = parts[1] ? parts[1].trim() : '';
                    twoFA = parts.slice(2).join('|').trim();
                } else {
                    const parts = currentLine.split(/\s+/);
                    uid = parts[0] ? parts[0].trim() : '';
                    pass = parts[1] ? parts[1].trim() : '';
                    
                    if (parts.length > 2) {
                        const rawAfterPass = currentLine.substring(currentLine.indexOf(pass) + pass.length).trim();
                        twoFA = rawAfterPass;
                    }
                }

                if (!uid) continue;

                const result = await checkFacebookUID(uid);
                const logLine = document.createElement('div');
                logLine.className = 'console-log';

                if (result === "LIVE ✅") {
                    logLine.className += ' log-live';
                    logLine.innerText = `[LIVE] ID: ${uid}`;
                    live++;
                    liveAccounts.push({ uid, pass, twoFA });
                } else {
                    logLine.className += ' log-die';
                    logLine.innerText = `[DIE] ID: ${uid}`;
                    die++;
                }

                consoleScreen.appendChild(logLine);
                consoleScreen.scrollTop = consoleScreen.scrollHeight; 
                updateStats();
            }
        }

        const workers = [];
        const activeThreads = Math.min(CONCURRENCY_LIMIT, queue.length);
        
        for (let i = 0; i < activeThreads; i++) {
            workers.push(worker());
        }

        await Promise.all(workers);

        const finalLog = document.createElement('div');
        finalLog.style.color = '#818cf8';
        finalLog.style.paddingTop = '10px';
        finalLog.style.fontWeight = 'bold';
        finalLog.innerText = `⚡ Completed! Total Live: ${live}, Total Die: ${die}`;
        consoleScreen.appendChild(finalLog);
        consoleScreen.scrollTop = consoleScreen.scrollHeight;
        
        startBtn.disabled = false;
        startBtn.innerText = "Start Scanner";
    }

    // ফিক্সড ডাউনলোড ফাংশন - কোটেশন সম্পূর্ণ রিমুভ করা হয়েছে
    function downloadLiveCSV() {
        if (liveAccounts.length === 0) {
            alert("No live accounts found to download!");
            return;
        }

        let csvRows = [];

        liveAccounts.forEach(account => {
            // কোনো কোটেশন বা কমা ছাড়া সরাসরি র ডেটা পুশ হবে
            csvRows.push(`${account.uid}|${account.pass}|${account.twoFA}`);
        });

        const csvString = csvRows.join("\n");
        const contentWithBOM = "\ufeff" + csvString;
        
        // ডাইরেক্ট .txt ফাইলে ডাউনলোড হবে যেন নোটপ্যাডে ওপেন করলে কোনো ডাবল ইনভার্টেড কমা না থাকে
        const blob = new Blob([contentWithBOM], { type: 'text/plain;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "live_accounts.txt");
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        setTimeout(() => URL.revokeObjectURL(url), 100);
    }

    function clearTool() {
        document.getElementById('inputData').value = '';
        document.getElementById('consoleScreen').innerHTML = 'Console ready...';
        document.getElementById('totalCount').innerText = '0';
        document.getElementById('livePercent').innerText = '0% LIVE';
        document.getElementById('diePercent').innerText = '0% DIE';
        liveAccounts = [];
    }
</script>

</body>
