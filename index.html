<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longisir VIP Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #060813; color: white; font-family: sans-serif; }
        .section { display: none; }
        .active { display: block; }
        .card { background: #0b0f19; border: 1px solid #334155; border-radius: 20px; padding: 25px; }
    </style>
</head>
<body>

<nav class="p-6 flex justify-center gap-4">
    <button onclick="showSection('home')" class="bg-purple-600 px-4 py-2 rounded">Home</button>
    <button onclick="showSection('tool-2fa')" class="bg-slate-800 px-4 py-2 rounded">2FA Tool</button>
    <button onclick="showSection('tool-mail')" class="bg-slate-800 px-4 py-2 rounded">Mail Tool</button>
    <button onclick="showSection('tool-uid')" class="bg-slate-800 px-4 py-2 rounded">UID Tool</button>
</nav>

<div id="home" class="section active p-10 text-center">
    <h1 class="text-3xl font-bold">Welcome to Longisir VIP Portal</h1>
</div>

<div id="tool-2fa" class="section p-10 max-w-xl mx-auto">
    <div class="card">
        <h2 class="text-xl mb-4 font-bold">2FA Authenticator</h2>
        <input id="secret-key" class="w-full p-3 bg-slate-900 rounded mb-4" placeholder="Enter Key">
        <button onclick="generate2FA()" class="w-full bg-purple-600 p-3 rounded font-bold">Generate</button>
        <div id="2fa-result" class="mt-4 text-center text-2xl font-mono text-green-400">---</div>
    </div>
</div>

<div id="tool-mail" class="section p-10 max-w-xl mx-auto">
    <div class="card">
        <h2 class="text-xl mb-4 font-bold">Mail Extractor</h2>
        <textarea id="mail-input" class="w-full h-32 bg-slate-900 p-3 rounded"></textarea>
        <button onclick="extractMail()" class="w-full bg-indigo-600 p-3 mt-4 rounded">Extract</button>
    </div>
</div>

<div id="tool-uid" class="section p-10 max-w-xl mx-auto">
    <div class="card">
        <h2 class="text-xl mb-4 font-bold">UID Checker</h2>
        <textarea id="uid-input" class="w-full h-32 bg-slate-900 p-3 rounded"></textarea>
        <button onclick="checkUID()" class="w-full bg-red-600 p-3 mt-4 rounded">Check</button>
    </div>
</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function generate2FA() { alert("2FA Logic Running!"); }
    function extractMail() { alert("Mail Logic Running!"); }
    function checkUID() { alert("UID Logic Running!"); }
</script>

</body>
</html>
