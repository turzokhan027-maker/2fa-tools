<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longisir VIP Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --primary: rgb(168, 85, 247); --bg: rgb(10, 11, 18); --card-bg: rgb(21, 23, 37); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; }
        .section { display: none; padding: 40px; }
        .active { display: block; }
        .card { background: var(--card-bg); border: 1px solid #334155; padding: 25px; border-radius: 20px; max-width: 600px; margin: auto; }
        nav { padding: 20px; display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid #1e293b; }
        button { cursor: pointer; background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <a onclick="showSection('home')" style="color:var(--primary); cursor:pointer;">Home</a>
    <a onclick="showSection('tool-2fa')" style="cursor:pointer;">2FA</a>
    <a onclick="showSection('tool-mail')" style="cursor:pointer;">Mail</a>
    <a onclick="showSection('tool-uid')" style="cursor:pointer;">UID</a>
</nav>

<div id="home" class="section active text-center">
    <h1>Longisir VIP Portal</h1>
    <p>Integrated Web Automation Engine.</p>
</div>

<div id="tool-2fa" class="section">
    <div class="card">
        <h2>2FA Authenticator</h2>
        <input id="secret-key" style="width:100%; padding:10px; margin:10px 0; background:#000; color:#fff;" placeholder="Enter Key">
        <button onclick="generate2FA()">Generate Code</button>
        <div id="2fa-result" style="margin-top:15px; font-size:24px; color:#4ade80;">XXXXXX</div>
    </div>
</div>

<div id="tool-mail" class="section">
    <div class="card">
        <h2>Mail Extractor</h2>
        <textarea id="mail-input" style="width:100%; height:100px; margin:10px 0; background:#000; color:#fff;"></textarea>
        <button onclick="alert('Mail Tool Active')">Extract</button>
    </div>
</div>

<div id="tool-uid" class="section">
    <div class="card">
        <h2>UID Checker</h2>
        <textarea id="uid-input" style="width:100%; height:100px; margin:10px 0; background:#000; color:#fff;"></textarea>
        <button onclick="alert('UID Tool Active')">Check Status</button>
    </div>
</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function generate2FA() {
        const key = document.getElementById('secret-key').value;
        if(!key) return alert("Key din!");
        const code = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('2fa-result').innerText = code;
    }
</script>

</body>
</html>
