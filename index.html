<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longisir VIP Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: rgb(168, 85, 247); --bg: rgb(10, 11, 18); }
        body { background: var(--bg); color: white; font-family: sans-serif; }
        .section { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<nav class="p-6 flex justify-center gap-4">
    <button onclick="showSection('home')" class="text-purple-500 font-bold">Home</button>
    <button onclick="showSection('tool-2fa')" class="text-gray-400">2FA</button>
    <button onclick="showSection('tool-mail')" class="text-gray-400">Mail</button>
    <button onclick="showSection('tool-uid')" class="text-gray-400">UID</button>
</nav>

<div id="home" class="section active p-10 text-center">
    <h1 class="text-3xl font-bold">Longisir VIP Portal</h1>
</div>

<div id="tool-2fa" class="section p-10 max-w-lg mx-auto">
    <input id="secret-key" class="w-full p-3 bg-gray-800 rounded" placeholder="Key likhun">
    <button onclick="generate2FA()" class="w-full bg-purple-600 mt-3 p-3 rounded font-bold">Generate Code</button>
    <div id="2fa-result" class="mt-4 text-center text-2xl text-green-400 font-mono">XXXXXX</div>
</div>

<div id="tool-mail" class="section p-10 max-w-lg mx-auto">
    <textarea id="mail-input" class="w-full h-32 bg-gray-800 p-3 rounded" placeholder="Data paste korun"></textarea>
    <button onclick="extractMail()" class="w-full bg-indigo-600 mt-3 p-3 rounded font-bold">Extract Now</button>
</div>

<div id="tool-uid" class="section p-10 max-w-lg mx-auto">
    <textarea id="uid-input" class="w-full h-32 bg-gray-800 p-3 rounded" placeholder="UID paste korun"></textarea>
    <button onclick="checkUID()" class="w-full bg-red-600 mt-3 p-3 rounded font-bold">Check Status</button>
</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // 2FA Logic
    function generate2FA() {
        const key = document.getElementById('secret-key').value;
        if(!key) return alert("Key din!");
        const code = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('2fa-result').innerText = code;
    }

    // Mail Logic
    function extractMail() {
        const data = document.getElementById('mail-input').value;
        if(!data) return alert("Data din!");
        alert("Extracting..."); // Ekhane tomar API mail-er real logic bosabe
    }

    // UID Logic
    function checkUID() {
        const uids = document.getElementById('uid-input').value;
        if(!uids) return alert("UID din!");
        alert("Checking..."); // Ekhane tomar fb chaker-er real logic bosabe
    }
</script>
</body>
</html>
