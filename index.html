<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longisir VIP Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --primary: rgb(168, 85, 247); --bg: rgb(10, 11, 18); --card-bg: rgb(21, 23, 37); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; }
        .section { display: none; width: 100%; padding: 40px; }
        .active { display: block; }
        nav { display: flex; justify-content: center; gap: 20px; padding: 20px; border-bottom: 1px solid #1f2937; }
        .nav-link { cursor: pointer; color: #9ca3af; font-weight: 600; }
        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body>

<nav>
    <a onclick="showSection('home', this)" class="nav-link active">Home</a>
    <a onclick="showSection('tool-2fa', this)" class="nav-link">2FA AUTH</a>
    <a onclick="showSection('tool-mail', this)" class="nav-link">API MAIL</a>
    <a onclick="showSection('tool-uid', this)" class="nav-link">UID CHECKER</a>
</nav>

<div id="home" class="section active"><h1>Home Dashboard</h1></div>

<div id="tool-2fa" class="section">
    <div style="background:var(--card-bg); padding:20px; border-radius:15px;">
        <h2>2FA Authenticator</h2>
        <input id="secret-key" placeholder="Enter Key" style="width:100%; padding:10px; margin:10px 0;">
        <button onclick="generate2FA()">Generate</button>
        <div id="2fa-result"></div>
    </div>
</div>

<div id="tool-mail" class="section">
    <div style="background:var(--card-bg); padding:20px; border-radius:15px;">
        <h2>API MAIL</h2>
        <textarea id="mail-input" style="width:100%; height:100px;"></textarea>
        <button onclick="alert('Mail tool working')">Extract</button>
    </div>
</div>

<div id="tool-uid" class="section">
    <div style="background:var(--card-bg); padding:20px; border-radius:15px;">
        <h2>UID CHECKER</h2>
        <textarea id="uid-input" style="width:100%; height:100px;"></textarea>
        <button onclick="alert('UID tool working')">Check</button>
    </div>
</div>

<script>
    function showSection(sectionId, element) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        element.classList.add('active');
    }

    function generate2FA() { /* 2fa.txt er logic ekhane bosabe */ }
</script>
</body>
</html>
